name: smart_spend_ai
description: "A new Flutter project for SmartSpend AI."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.1
  google_fonts: ^6.1.0
  intl: ^0.18.1
  fl_chart: ^0.65.0
  heroicons: ^0.8.0
  cupertino_icons: ^1.0.2
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  uuid: ^4.5.3
  pdf: ^3.12.0
  printing: ^5.14.3
  path_provider: ^2.1.5
  share_plus: ^13.1.0
  open_filex: ^4.7.0
  universal_html: ^2.3.0
  google_generative_ai: ^0.4.7
  flutter_dotenv: ^6.0.1
  speech_to_text: ^7.4.0
  permission_handler: ^12.0.3

  crypto: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon.png"
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#000000"
    theme_color: "#000000"
  macos:
    generate: true
    image_path: "assets/icon.png"

flutter_native_splash:
  color: "#000000"
  image: "assets/images/logo.png"
  android_12:
    image: "assets/images/logo.png"
    color: "#000000"
    icon_background_color: "#000000"
  web: false
